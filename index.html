<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salah Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d1117;--surface:#161b22;--surface2:#1e242e;--border:#2a3040;
    --text:#e6edf3;--text-muted:#7d8590;--text-dim:#3d444d;
    --gold:#c9a84c;
    --green:#1db954;--green-dim:rgba(29,185,84,0.18);
    --amber:#FF9D23;--amber-dim:rgba(255,157,35,0.18);
    --red:#e8445a;--red-dim:rgba(232,68,90,0.18);
    --purple:#9b6dff;--purple-dim:rgba(155,109,255,0.18);
    --radius:14px;--radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(201,168,76,0.07) 0%,transparent 70%);pointer-events:none;z-index:0;}
  #app{position:relative;z-index:1;max-width:480px;margin:0 auto;padding-bottom:100px;}

  .header{text-align:center;padding:20px 16px 6px;}
  .header h1{font-size:24px;font-weight:600;letter-spacing:-0.4px;}
  .header-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);margin-top:3px;letter-spacing:0.06em;}

  .header-actions{display:flex;align-items:center;justify-content:center;gap:8px;padding:8px 16px 0;}
  .header-today-btn{background:var(--gold);color:#0d1117;border:none;border-radius:var(--radius-sm);padding:6px 16px;font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
  .header-icon-btn{background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-muted);font-size:12px;font-family:'Outfit',sans-serif;padding:6px 14px;cursor:pointer;white-space:nowrap;}
  .header-icon-btn:hover{border-color:var(--gold);color:var(--gold);}
  .header-icon-btn.reset-btn:hover{border-color:var(--red);color:var(--red);}

  .timeline-wrap{position:sticky;top:0;z-index:10;background:rgba(13,17,23,0.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:8px 0 10px;margin-top:8px;}
  .timeline-month-label{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);text-align:center;margin-bottom:8px;}
  .timeline-scroll{display:flex;gap:5px;overflow-x:auto;padding:0 16px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .timeline-scroll::-webkit-scrollbar{display:none;}
  .day-pill{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:42px;padding:5px 4px 6px;border-radius:22px;border:1px solid transparent;cursor:pointer;transition:all 0.18s;flex-shrink:0;}
  .day-pill:hover{background:var(--surface2);}
  .day-pill.active{background:var(--gold);border-color:var(--gold);}
  .day-pill.today-pill:not(.active){border-color:rgba(201,168,76,0.5);}
  .day-pill.future-pill{opacity:0.45;}
  .day-pill .dp-name{font-size:9px;font-weight:600;color:var(--text-muted);letter-spacing:0.06em;text-transform:uppercase;}
  .day-pill .dp-num{font-size:15px;font-weight:700;color:var(--text);font-family:'DM Mono',monospace;line-height:1;}
  .day-pill.active .dp-name,.day-pill.active .dp-num{color:#0d1117;}
  .dp-dots{display:flex;gap:2px;}
  .dp-dot{width:4px;height:4px;border-radius:50%;background:var(--border);}
  .dp-dot.e{background:var(--green);} .dp-dot.o{background:var(--amber);}
  .dp-dot.l{background:var(--red);}   .dp-dot.x{background:var(--purple);}
  .day-pill.active .dp-dot{opacity:0.5;}

  .dp-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
  .dp-overlay.hidden{display:none;}
  .dp-modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;width:300px;max-width:92vw;}
  .dp-modal-title{font-size:14px;font-weight:600;margin-bottom:14px;color:var(--text);}
  .dp-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .dp-nav-btn{background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--text-muted);width:28px;height:28px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
  .dp-nav-btn:hover{border-color:var(--gold);color:var(--gold);}
  .dp-month-label{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:var(--text);}
  .dp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
  .dp-day-hdr{font-size:9px;font-weight:600;color:var(--text-dim);text-align:center;padding:4px 0;text-transform:uppercase;}
  .dp-cell{aspect-ratio:1;border-radius:8px;border:1px solid transparent;background:transparent;color:var(--text-muted);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .dp-cell:hover:not(.dp-empty):not(.dp-disabled){background:var(--surface2);border-color:var(--border);}
  .dp-cell.dp-today{border-color:rgba(201,168,76,0.45);color:var(--gold);}
  .dp-cell.dp-selected{background:var(--gold);color:#0d1117;font-weight:700;}
  .dp-cell.dp-disabled{opacity:0.18;cursor:default;}
  .dp-cell.dp-empty{cursor:default;}
  .dp-cell.dp-has-data{color:var(--text);}
  .dp-footer{display:flex;gap:8px;margin-top:14px;}
  .dp-btn{flex:1;padding:9px;border-radius:var(--radius-sm);border:none;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
  .dp-btn-cancel{background:var(--surface2);color:var(--text-muted);}
  .dp-btn-go{background:var(--gold);color:#0d1117;}

  .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:300;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
  .confirm-overlay.hidden{display:none;}
  .confirm-modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;width:280px;max-width:88vw;text-align:center;}
  .confirm-icon{font-size:32px;margin-bottom:10px;}
  .confirm-title{font-size:16px;font-weight:700;margin-bottom:6px;}
  .confirm-msg{font-size:12px;color:var(--text-muted);line-height:1.6;margin-bottom:18px;}
  .confirm-footer{display:flex;gap:8px;}
  .confirm-btn{flex:1;padding:10px;border-radius:var(--radius-sm);border:none;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
  .confirm-cancel{background:var(--surface2);color:var(--text-muted);}
  .confirm-reset{background:var(--red);color:white;}

  .nav{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px;margin:10px 16px 14px;}
  .nav-btn{flex:1;padding:8px 6px;border:none;background:transparent;color:var(--text-muted);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;border-radius:var(--radius-sm);cursor:pointer;transition:all 0.18s;}
  .nav-btn.active{background:var(--gold);color:#0d1117;font-weight:600;}

  .section-label{font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-dim);margin:16px 0 8px;display:flex;align-items:center;gap:8px;}
  .section-label::after{content:'';flex:1;height:1px;background:var(--border);}
  .page-inner{padding:0 16px;}

  /* FARD CARDS */
  .salah-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;gap:12px;transition:all 0.2s;position:relative;overflow:hidden;}
  .salah-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border);}
  .salah-card.status-early::before{background:var(--green);}
  .salah-card.status-ontime::before{background:var(--amber);}
  .salah-card.status-late::before{background:var(--red);}
  .salah-card.status-excused::before{background:var(--purple);}
  .salah-card.status-early{background:linear-gradient(90deg,var(--green-dim) 0%,var(--surface) 55%);border-color:rgba(29,185,84,0.28);}
  .salah-card.status-ontime{background:linear-gradient(90deg,var(--amber-dim) 0%,var(--surface) 55%);border-color:rgba(255,157,35,0.28);}
  .salah-card.status-late{background:linear-gradient(90deg,var(--red-dim) 0%,var(--surface) 55%);border-color:rgba(232,68,90,0.28);}
  .salah-card.status-excused{background:linear-gradient(90deg,var(--purple-dim) 0%,var(--surface) 55%);border-color:rgba(155,109,255,0.28);}
  .salah-icon{width:32px;height:32px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .salah-icon img{width:28px;height:28px;object-fit:contain;}
  .salah-info{flex:1;min-width:0;}
  .salah-name{font-size:15px;font-weight:600;letter-spacing:-0.2px;}
  /* status buttons: icon images, 30x30 */
  .status-btns{display:flex;gap:5px;flex-shrink:0;}
  .status-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:4px;transition:all 0.15s;opacity:0.45;}
  .status-btn img{width:22px;height:22px;object-fit:contain;}
  .status-btn:hover{transform:scale(1.08);opacity:0.8;}
  .status-btn.active-btn{opacity:1;border-color:transparent;}
  .status-btn.active-early{background:var(--green-dim);border-color:var(--green);}
  .status-btn.active-ontime{background:var(--amber-dim);border-color:var(--amber);}
  .status-btn.active-late{background:var(--red-dim);border-color:var(--red);}
  .status-btn.active-excused{background:var(--purple-dim);border-color:var(--purple);}

  /* SUNNAH CARDS */
  .sunnah-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;transition:all 0.18s;}
  .sunnah-card.done-yes{background:var(--green-dim);border-color:rgba(29,185,84,0.3);}
  .sunnah-card.done-no{background:var(--red-dim);border-color:rgba(232,68,90,0.22);}
  .sunnah-card.auto-excused{background:var(--purple-dim);border-color:rgba(155,109,255,0.28);opacity:0.75;}
  .sunnah-excused-badge{font-size:10px;font-weight:700;color:var(--purple);background:var(--purple-dim);border:1px solid var(--purple);border-radius:6px;padding:2px 7px;white-space:nowrap;flex-shrink:0;}
  .sunnah-icon{width:26px;height:26px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .sunnah-icon img{width:22px;height:22px;object-fit:contain;}
  .sunnah-info{flex:1;min-width:0;}
  .sunnah-name{font-size:14px;font-weight:500;}
  .sunnah-detail{font-size:11px;color:var(--text-muted);margin-top:2px;}
  .tick-btn{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--text-muted);flex-shrink:0;}
  .tick-btn.yes{background:var(--green-dim);border-color:var(--green);color:var(--green);}
  .tick-btn.no{background:var(--red-dim);border-color:var(--red);color:var(--red);}

  /* Legend */
  .legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted);}
  .legend-item img{width:16px;height:16px;object-fit:contain;}

  .ramadan-banner{background:linear-gradient(135deg,rgba(201,168,76,0.1),rgba(201,168,76,0.03));border:1px solid rgba(201,168,76,0.22);border-radius:var(--radius);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;margin-top:18px;cursor:pointer;}
  .ramadan-banner:hover{border-color:rgba(201,168,76,0.42);}
  .ramadan-banner.active{background:linear-gradient(135deg,rgba(201,168,76,0.18),rgba(201,168,76,0.07));border-color:rgba(201,168,76,0.48);}
  .ramadan-label{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:var(--gold);}
  .toggle-pill{width:38px;height:20px;background:var(--border);border-radius:10px;position:relative;transition:background 0.2s;}
  .toggle-pill::after{content:'';position:absolute;width:14px;height:14px;background:white;border-radius:50%;top:3px;left:3px;transition:transform 0.2s;}
  .ramadan-banner.active .toggle-pill{background:var(--gold);}
  .ramadan-banner.active .toggle-pill::after{transform:translateX(18px);}

  .page{display:none;} .page.visible{display:block;}

  /* STATS */
  .stats-period-tabs{display:flex;gap:3px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px;margin:0 16px 4px;}
  .spt{flex:1;padding:7px 2px;border:none;background:transparent;color:var(--text-muted);font-family:'Outfit',sans-serif;font-size:11px;font-weight:500;border-radius:var(--radius-sm);cursor:pointer;transition:all 0.18s;}
  .spt.active{background:var(--gold);color:#0d1117;font-weight:700;}
  .stats-nav-row{display:flex;align-items:center;justify-content:center;gap:10px;padding:8px 16px 2px;}
  .month-arrow{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1;flex-shrink:0;}
  .month-arrow:hover:not(:disabled){border-color:var(--gold);color:var(--gold);}
  .month-arrow:disabled{opacity:0.22;cursor:default;}
  .stats-period-label{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:var(--text);min-width:150px;text-align:center;}
  .stats-swipe-outer{overflow:hidden;touch-action:pan-y;}
  .stats-swipe-inner{display:flex;}
  .stats-panel{min-width:100%;width:100%;padding:6px 0 24px;flex-shrink:0;}
  .pi{padding:0 14px;}
  .stats-sec{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-muted);margin:16px 0 8px;display:flex;align-items:center;gap:8px;}
  .stats-sec::after{content:'';flex:1;height:1px;background:var(--border);}

  .focus-banner{background:linear-gradient(135deg,rgba(232,68,90,0.12),rgba(232,68,90,0.04));border:1px solid rgba(232,68,90,0.3);border-radius:var(--radius);padding:14px;}
  .focus-banner-title{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--red);margin-bottom:8px;}
  .focus-banner-body{font-size:12px;color:var(--text-muted);line-height:1.7;}
  .focus-banner-prayer{display:flex;align-items:center;gap:8px;margin-top:8px;padding:8px 10px;background:rgba(232,68,90,0.08);border-radius:var(--radius-sm);}
  .focus-banner-prayer-name{font-size:13px;font-weight:600;color:var(--text);flex:1;}
  .focus-banner-prayer-pct{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:var(--red);}

  /* BREAKDOWN CARD */
  .pb-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 14px 12px;margin-bottom:10px;overflow:hidden;}
  .pb-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .pb-hdr-icon{width:30px;height:30px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .pb-hdr-icon img{width:26px;height:26px;object-fit:contain;}
  .pb-name{font-size:17px;font-weight:600;}
  .pb-bar-track{flex:1;display:flex;gap:2px;height:9px;margin-bottom:10px;}
  .pb-seg{height:9px;min-width:0;border-radius:5px;}
  .pb-pct-row{display:flex;align-items:center;}
  .pb-pct-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:0;}
  .pb-pct-ico{width:18px;height:18px;object-fit:contain;}
  .pb-pct-val{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;white-space:nowrap;}
  .pb-pct-delta{font-size:10px;font-weight:700;margin-top:1px;}
  .pb-pct-delta.good{color:var(--green);}
  .pb-pct-delta.bad{color:var(--red);}

  /* Sub-tabs: Fard | Rawatib & Nafl */
  .stats-sub-tabs{display:flex;gap:0;margin:6px 16px 0;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;}
  .sspt{flex:1;padding:8px 4px;border:none;background:transparent;color:var(--text-muted);font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.18s;border-right:1px solid var(--border);}
  .sspt:last-child{border-right:none;}
  .sspt.active{background:var(--surface);color:var(--text);font-weight:600;}

  /* Sunnah card pct row: done left-centre, skipped right-centre */
  .sn-pct-row{display:flex;align-items:center;justify-content:space-between;}
  .sn-pct-done{display:flex;align-items:center;gap:5px;}
  .sn-pct-skip{display:flex;align-items:center;gap:5px;}
  .sn-pct-label{font-size:11px;font-weight:600;}
  .sn-pct-num{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;}

  /* Overall 2x2 summary grid */
  .ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px;}
  .ov-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 12px 12px;overflow:hidden;min-width:0;}
  .ov-top{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em;}
  .ov-ico{width:16px;height:16px;object-fit:contain;flex-shrink:0;}
  .ov-pct{font-size:28px;font-weight:700;line-height:1;letter-spacing:-0.5px;margin-bottom:3px;}
  .ov-count{font-size:11px;color:var(--text-muted);margin-bottom:6px;}
  .ov-delta{font-size:11px;font-weight:600;word-break:break-word;}
  .ov-delta.good{color:var(--green);}
  .ov-delta.bad{color:var(--red);}
  .ov-delta.neutral{color:var(--text-muted);}


  /* Toast */
  .sync-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--green);color:var(--green);font-size:12px;font-weight:600;padding:8px 18px;border-radius:20px;opacity:0;transition:all 0.25s;pointer-events:none;z-index:9999;white-space:nowrap;}
  .sync-toast.visible{opacity:1;transform:translateX(-50%) translateY(0);}
  .stats-empty{text-align:center;padding:36px 20px;color:var(--text-muted);font-size:13px;line-height:1.8;}
  .stats-empty-icon{font-size:36px;margin-bottom:12px;opacity:0.35;display:block;}
</style>

<body>
<div id="app">

  <div class="header">
    <h1>Salah Tracker</h1>
    <div class="header-date" id="headerDate"></div>
  </div>
  <div class="header-actions">
    <button class="header-today-btn" onclick="jumpToToday()">Today</button>
    <button class="header-icon-btn" onclick="openDatePicker()">Date</button>
    <button class="header-icon-btn reset-btn" onclick="openResetConfirm()">Reset</button>

  </div>

  <div class="timeline-wrap">
    <div class="timeline-month-label" id="timelineMonthLabel"></div>
    <div class="timeline-scroll" id="timelineScroll"></div>
  </div>

  <div class="dp-overlay hidden" id="dpOverlay">
    <div class="dp-modal">
      <div class="dp-modal-title">Jump to a date</div>
      <div class="dp-nav">

// ══ STORAGE — localStorage (instant) + Firestore (cross-browser sync) ══
// Your data key lives in the URL hash (#yourkey).
// Share the same URL on any browser/device to access the same data.
// On first visit with no hash, a unique key is generated and the URL updates.

let _syncTimeout = null;

function getDataKey() {
  // Use URL hash as the data key so any browser with the same URL gets the same data
  let key = window.location.hash.slice(1); // strip leading #
  if (!key || key.length < 8) {
    // Generate a new key and put it in the URL
    key = 'st_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    window.location.hash = key;
    // Also persist locally as fallback
    localStorage.setItem('salah_data_key', key);
  }
  return key;
}
const DEVICE_ID = getDataKey();

function schedulePush() {
  clearTimeout(_syncTimeout);
  _syncTimeout = setTimeout(pushToFirebase, 2000);
}

async function pushToFirebase() {
  const fb = window._fb;
  if (!fb || !fb.ready) return;
  try {
    const data = JSON.parse(localStorage.getItem('salah_v6') || '{}');
    const ram  = localStorage.getItem('salah_ramadan') || 'false';
    const ref  = fb.doc(fb.db, 'salahData', DEVICE_ID);
    await fb.setDoc(ref, { data, ramadan: ram, updatedAt: fb.serverTimestamp() }, { merge: true });
    showSyncToast('Saved ✓');
  } catch (e) { console.warn('Firestore push (offline?):', e.message); }
}

async function pullFromFirebase() {
  const fb = window._fb;
  if (!fb || !fb.ready) return;
  try {
    const ref  = fb.doc(fb.db, 'salahData', DEVICE_ID);
    const snap = await fb.getDoc(ref);
    if (snap.exists()) {
      const { data, ramadan: ram } = snap.data();
      if (data && Object.keys(data).length > 0) localStorage.setItem('salah_v6', JSON.stringify(data));
      if (ram != null) localStorage.setItem('salah_ramadan', String(ram));
      ramadan = localStorage.getItem('salah_ramadan') === 'true';
    }
  } catch (e) { console.warn('Firestore pull (offline?):', e.message); }
}

window.onFirebaseReady = async function () {
  await pullFromFirebase();
  buildTimeline(); renderTracker();
  if (document.getElementById('page-stats').classList.contains('visible')) renderStats();
};

function showSyncToast(msg) {
  let t = document.getElementById('syncToast');
  if (!t) { t = document.createElement('div'); t.id = 'syncToast'; document.body.appendChild(t); }
  t.textContent = msg; t.className = 'sync-toast visible';
  clearTimeout(t._to); t._to = setTimeout(() => t.classList.remove('visible'), 2200);
}

// ══ DATE UTILS ══
function pad(n){return String(n).padStart(2,'0');}
function realTodayKey(){const n=new Date();return `${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}`;}
function keyFromDate(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function dateFromKey(k){const[y,m,d]=k.split('-').map(Number);return new Date(y,m-1,d);}
function clamp(k){return k<APP_START?APP_START:k;}
let selectedDay=clamp(realTodayKey());

// ══ TIMELINE ══
const DAYS_AHEAD=30;
function buildTimeline(){
  const scroll=document.getElementById('timelineScroll');scroll.innerHTML='';
  const todayKey=realTodayKey();const start=dateFromKey(APP_START);
  const endD=new Date();endD.setDate(endD.getDate()+DAYS_AHEAD);
  const data=loadData();
  for(let d=new Date(start);d<=endD;d.setDate(d.getDate()+1)){
    const k=keyFromDate(d),obj=new Date(d);const dd=data[k];
    const dots=FARD.map(f=>{
      const s=dd?.fard?.[f.id];
      const c=s==='early'?'e':s==='ontime'?'o':s==='late'?'l':s==='excused'?'x':'';
      return `<div class="dp-dot${c?' '+c:''}"></div>`;
    }).join('');
    const pill=document.createElement('div');
    pill.className=`day-pill${k===selectedDay?' active':''}${k===todayKey?' today-pill':''}${k>todayKey?' future-pill':''}`;
    pill.dataset.key=k;
    pill.innerHTML=`<div class="dp-name">${DAYS[obj.getDay()].slice(0,2)}</div><div class="dp-num">${obj.getDate()}</div><div class="dp-dots">${dots}</div>`;
    pill.addEventListener('click',()=>selectDay(k));
    scroll.appendChild(pill);
  }
  updateTimelineMonth();
  setTimeout(()=>{const a=scroll.querySelector('.day-pill.active');if(a)a.scrollIntoView({inline:'center',behavior:'smooth'});},60);
}
function updateTimelineMonth(){
  const d=dateFromKey(selectedDay);
  document.getElementById('timelineMonthLabel').textContent=`${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
}
function selectDay(key){
  selectedDay=clamp(key);
  document.querySelectorAll('.day-pill').forEach(p=>p.classList.toggle('active',p.dataset.key===selectedDay));
  updateTimelineMonth();renderTracker();
  const pill=document.querySelector(`.day-pill[data-key="${selectedDay}"]`);
  if(pill)pill.scrollIntoView({inline:'center',behavior:'smooth'});
}
function refreshPillDots(key){
  const pill=document.querySelector(`.day-pill[data-key="${key}"]`);if(!pill)return;
  const dd=loadData()[key];
  pill.querySelector('.dp-dots').innerHTML=FARD.map(f=>{
    const s=dd?.fard?.[f.id];
    const c=s==='early'?'e':s==='ontime'?'o':s==='late'?'l':s==='excused'?'x':'';
    return `<div class="dp-dot${c?' '+c:''}"></div>`;
  }).join('');
}
function jumpToToday(){
  const tk=realTodayKey();selectedDay=tk;

  updateTimelineMonth();renderTracker();

function renderTracker(){
  const key=selectedDay,day=getDay(key),d=dateFromKey(key);
  document.getElementById('headerDate').textContent=d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  (ramadan?[...NAFL_BASE,TARAWEEH]:NAFL_BASE).forEach(r=>mkSunnahCard(nl,r,day));
}
function mkSunnahCard(container,item,day){
  const val=day.sunnah[item.id];const card=document.createElement('div');
  const isAutoExcused=val==='auto-excused';
  card.className=`sunnah-card${val===true?' done-yes':val===false?' done-no':isAutoExcused?' auto-excused':''}`;
  const parentKey=RAWATIB_PARENT[item.id]||NAFL_PARENT[item.id]||'fajr';
  card.innerHTML=`
    <button class="tick-btn${val===true?' yes':''}" onclick="setSunnah('${item.id}',true)">&#10003;</button>
    <div class="sunnah-icon">${icoImg(parentKey,22)}</div>
    <div class="sunnah-info"><div class="sunnah-name">${item.name}</div>${item.detail?`<div class="sunnah-detail">${item.detail}</div>`:''}</div>
    ${isAutoExcused
      ?`<div class="sunnah-excused-badge">Excused</div>`
      :`<button class="tick-btn${val===false?' no':''}" onclick="setSunnah('${item.id}',false)">&#10005;</button>`
    }`;
  container.appendChild(card);
}
function setFard(id,status){
  const key=selectedDay,day=getDay(key);
  const newStatus=day.fard[id]===status?'none':status;
  day.fard[id]=newStatus;
  // When a fard prayer is marked excused, auto-mark all related sunnah/nafl as excused too
  // Nafl prayers are included when ramadan mode is on (taraweeh) or always (duha/witr/tahajjud)
  const FARD_SUNNAH_MAP={
    fajr:   ['r_fajr2','duha'],
    dhuhr:  ['r_dhuhr4b','r_dhuhr2a','r_dhuhr2a2'],
    asr:    ['witr','tahajjud'],
    maghrib:['r_maghrib2'],
    isha:   ['r_isha2'].concat(ramadan?['taraweeh']:[]),
  };
  const related=FARD_SUNNAH_MAP[id]||[];
  related.forEach(sid=>{
    if(newStatus==='excused'){
      if(day.sunnah[sid]===undefined) day.sunnah[sid]='auto-excused';
    } else {
      if(day.sunnah[sid]==='auto-excused') day.sunnah[sid]=undefined;
    }
  });
  setDay(key,day);renderTracker();refreshPillDots(key);
}
function setSunnah(id,val){
  const key=selectedDay,day=getDay(key);
  // Allow manual tap to override auto-excused
  const cur=day.sunnah[id];
  day.sunnah[id]=(cur===val||cur==='auto-excused'&&val===undefined)?undefined:val;
  setDay(key,day);renderTracker();
}
function toggleRamadan(){ramadan=!ramadan;localStorage.setItem('salah_ramadan',String(ramadan));schedulePush();renderTracker();}

let statsPeriod='week', statsOffset=0, statsSubTab='fard';

function initStats(){
  statsPeriod='week';statsOffset=0;statsSubTab='fard';
  document.querySelectorAll('.spt').forEach((b,i)=>b.classList.toggle('active',i===0));
  document.querySelectorAll('.sspt').forEach((b,i)=>b.classList.toggle('active',i===0));

function selectSubTab(tab,btn){
  statsSubTab=tab;

  btn.classList.add('active');renderStats();
}
function minOffset(){
  if(statsPeriod==='all')return 0;const today=new Date();
  if(statsPeriod==='week'){
    const dow=(today.getDay()+6)%7;const mon=new Date(today);mon.setDate(today.getDate()-dow);
    return -Math.floor((mon-dateFromKey(FIRST_WEEK_START))/604800000);
  }
  if(statsPeriod==='month'){
    const a=dateFromKey(APP_START);
    return -((today.getFullYear()-a.getFullYear())*12+(today.getMonth()-a.getMonth()));
  }
  if(statsPeriod==='year')return-(today.getFullYear()-2026);
  return 0;
}
function statsShift(dir){
  if(statsPeriod==='all')return;const n=statsOffset+dir;
  if(n<minOffset()||n>0)return;statsOffset=n;renderStats(dir);
}
function isPeriodComplete(){return statsOffset<0;}

let swipeSX=null,swipeSY=null;
document.getElementById('statsSwipeOuter').addEventListener('touchstart',e=>{
  if(statsPeriod==='all')return;swipeSX=e.touches[0].clientX;swipeSY=e.touches[0].clientY;
},{passive:true});
document.getElementById('statsSwipeOuter').addEventListener('touchend',e=>{
  if(swipeSX===null||statsPeriod==='all'){swipeSX=null;return;}
  const dx=e.changedTouches[0].clientX-swipeSX,dy=e.changedTouches[0].clientY-(swipeSY||0);
  swipeSX=null;swipeSY=null;
  if(Math.abs(dx)>90&&Math.abs(dx)>Math.abs(dy)*2)statsShift(dx<0?1:-1);
},{passive:true});

function getDates(period,offset){
  const today=new Date();today.setHours(23,59,59,999);const appStart=dateFromKey(APP_START);
  let start,end=new Date(today);
  if(period==='week'){
    const dow=(today.getDay()+6)%7;start=new Date(today);start.setDate(today.getDate()-dow+offset*7);
    end=new Date(start);end.setDate(start.getDate()+6);if(end>today)end=new Date(today);
  } else if(period==='month'){
    const t=new Date(today.getFullYear(),today.getMonth()+offset,1);
    start=new Date(t.getFullYear(),t.getMonth(),1);end=new Date(t.getFullYear(),t.getMonth()+1,0);
    if(end>today)end=new Date(today);
  } else if(period==='year'){
    const yr=today.getFullYear()+offset;start=new Date(yr,0,1);end=new Date(yr,11,31);
    if(end>today)end=new Date(today);
  } else {start=new Date(appStart);}
  if(start<appStart)start=new Date(appStart);if(end<start)return[];
  const dates=[];for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1))dates.push(keyFromDate(d));
  return dates;
}
function periodLabel(){
  const today=new Date();
  if(statsPeriod==='week'){
    const dow=(today.getDay()+6)%7;const mon=new Date(today);mon.setDate(today.getDate()-dow+statsOffset*7);
    const sun=new Date(mon);sun.setDate(mon.getDate()+6);
    return `${mon.getDate()} ${MONTHS[mon.getMonth()]} \u2013 ${sun.getDate()} ${MONTHS[sun.getMonth()]}`;
  }
  if(statsPeriod==='month'){const t=new Date(today.getFullYear(),today.getMonth()+statsOffset,1);return `${MONTHS_FULL[t.getMonth()]} ${t.getFullYear()}`;}
  if(statsPeriod==='year')return `${today.getFullYear()+statsOffset}`;
  return 'All Time';
}

// ── Calculation ──
// Per-prayer: denominator = days that specific prayer was explicitly recorded
function calcPerSalah(dates){
  const data=loadData();const per={};
  FARD.forEach(f=>per[f.id]={early:0,ontime:0,late:0,excused:0,recorded:0});
  dates.forEach(dk=>{
    const dd=data[dk];
    FARD.forEach(f=>{
      const s=dd?.fard?.[f.id];
      if(s&&s!=='none'){per[f.id][s]++;per[f.id].recorded++;}
    });
  });
  return per;
}
function calcSunnah(dates,items){
  const data=loadData();const res={};
  items.forEach(r=>res[r.id]={done:0,skipped:0,excused:0,total:0});
  dates.forEach(dk=>{
    const dd=data[dk];
    items.forEach(r=>{
      const v=dd?.sunnah?.[r.id];
      if(v===true){res[r.id].done++;res[r.id].total++;}
      else if(v===false){res[r.id].skipped++;res[r.id].total++;}
      else if(v==='auto-excused'){res[r.id].excused++;res[r.id].total++;}
    });
  });
  return res;
}
function pct(n,t){return t?Math.round(n/t*100):0;}

// ── Prayer Grid ──
function buildPrayerGrid(dates,items,accessor,getIconKey){
  const showDates=dates.slice(-31);if(!showDates.length)return'';
  const avail=292;const n=showDates.length;const GAP=2;
  const CELL=Math.max(10,Math.min(18,Math.floor((avail-(n-1)*GAP)/n)));
  const ICON_COL=22;
  const headerCells=showDates.map(dk=>{
    const dn=dateFromKey(dk).getDate();
    const show=(n<=7)||dn===1||dn===8||dn===15||dn===22||dn===29;
    return `<span style="display:inline-block;width:${CELL}px;font-family:'DM Mono',monospace;font-size:9px;font-weight:700;color:${show?'var(--text-muted)':'transparent'};text-align:center;line-height:1">${dn}</span>`;
  }).join(`<span style="display:inline-block;width:${GAP}px"></span>`);
  const data=loadData();
  const rows=items.map(item=>{
    const iconKey=getIconKey(item.id);
    const cells=showDates.map(dk=>{
      const cls=accessor(data[dk],item);
      const bg=cls==='early'?'var(--green)':cls==='ontime'?'var(--amber)':cls==='late'?'var(--red)':cls==='excused'?'var(--purple)':cls==='done'?'var(--green)':cls==='skip'?'var(--red)':'var(--border)';
      return `<span style="display:inline-block;width:${CELL}px;height:${CELL}px;border-radius:3px;background:${bg}"></span>`;
    }).join(`<span style="display:inline-block;width:${GAP}px"></span>`);
    return `<div style="display:flex;align-items:center;margin-bottom:4px">
      <span style="display:inline-block;width:${ICON_COL}px;flex-shrink:0;line-height:0;padding-right:4px"><img src="${IC[iconKey]}" style="width:${ICON_COL-4}px;height:${ICON_COL-4}px;object-fit:contain"></span>
      <div style="overflow:hidden;line-height:0">${cells}</div>
    </div>`;
  }).join('');
  return `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 10px 8px">
    <div style="display:flex;align-items:flex-end;margin-bottom:4px">
      <span style="display:inline-block;width:${ICON_COL}px;flex-shrink:0"></span>
      <div style="overflow:hidden;line-height:1">${headerCells}</div>
    </div>
    ${rows}
  </div>`;
}

function fardAccessor(dd,f){const s=dd?.fard?.[f.id];return(s&&s!=='none')?s:'none';}
function sunnahAccessor(dd,r){const v=dd?.sunnah?.[r.id];return v===true?'done':v===false?'skip':v==='auto-excused'?'excused':'none';}
function fardIconKey(id){return id;}
function rawatibIconKey(id){return RAWATIB_PARENT[id]||'fajr';}
function naflIconKey(id){return NAFL_PARENT[id]||'isha';}

// ── Delta helpers ──
// Per-salah comparison vs previous period
function getSalahDelta(curPct,prevPer,fId,key){
  const ps=prevPer[fId];if(!ps||ps.recorded===0)return'';
  const pp=pct(ps[key]||0,ps.recorded);const diff=curPct-pp;if(diff===0)return'';
  const good=key==='early'?diff>0:(key==='excused'?null:diff<0);const sign=diff>0?'+':'';
  const cls=good===null?'neutral':good?'good':'bad';
  return`<span class="pb-pct-delta ${cls}">${diff>0?'\u25b2':'\u25bc'}${sign}${diff}%</span>`;
}
function getSunnahDeltaVal(curPct,prevSunnah,itemId){
  const ps=prevSunnah[itemId];if(!ps||ps.total===0)return'';
  const pp=pct(ps.done,ps.total);const diff=curPct-pp;if(diff===0)return'';
  const sign=diff>0?'+':'';
  return`<span class="pb-pct-delta ${diff>0?'good':'bad'}">${diff>0?'\u25b2':'\u25bc'}${sign}${diff}%</span>`;
}

// ── Focus banner ──
function buildFocusBanner(per){
  const ranked=FARD.map(f=>{
    const ps=per[f.id];if(ps.recorded===0)return null;
    return{name:f.name,p:pct(ps.early,ps.recorded),id:f.id};
  }).filter(Boolean).sort((a,b)=>a.p-b.p);
  if(!ranked.length)return'';
  const worst=ranked[0];
  const pName=statsPeriod==='week'?'week':statsPeriod==='month'?'month':'year';
  return`<div class="focus-banner">
    <div class="focus-banner-title">\u26a0 Focus for next ${pName}</div>
    <div class="focus-banner-body">You prayed <strong>${worst.name}</strong> on time least often this ${pName}.</div>
    <div class="focus-banner-prayer">
      <span style="line-height:0">${icoImg(worst.id,22)}</span>
      <span class="focus-banner-prayer-name">${worst.name}</span>
      <span class="focus-banner-prayer-pct">${worst.p}% on time</span>
    </div>
    ${ranked.length>1?`<div style="margin-top:6px;font-size:11px;color:var(--text-dim)">${ranked.map(r=>`${r.name} ${r.p}%`).join(' \u00b7 ')}</div>`:''}\n  </div>`;
}

// ── Fard breakdown card ──
// Shows all 4 statuses + comparison vs previous period for each
function buildFardCard(f,ps,prevPer){
  const t=ps.recorded;
  const eW=pct(ps.early,t),oW=pct(ps.ontime,t),lW=pct(ps.late,t),xW=pct(ps.excused,t);
  const segs=[
    {w:xW,c:'var(--purple)'},{w:eW,c:'var(--green)'},
    {w:oW,c:'var(--amber)'},{w:lW,c:'var(--red)'},
  ].filter(s=>s.w>0);
  const barInner=t===0
    ?`<div class="pb-seg" style="flex:100;background:var(--border)"></div>`
    :segs.map(s=>`<div class="pb-seg" style="flex:${s.w};background:${s.c}"></div>`).join('');
  const dE=getSalahDelta(eW,prevPer,f.id,'early');
  const dO=getSalahDelta(oW,prevPer,f.id,'ontime');
  const dL=getSalahDelta(lW,prevPer,f.id,'late');
  const dX=getSalahDelta(xW,prevPer,f.id,'excused');
  return`<div class="pb-card">
    <div class="pb-header">
      <div class="pb-hdr-icon">${icoImg(f.id,26)}</div>
      <span class="pb-name">${f.name}</span>
    </div>
    <div class="pb-bar-track">${barInner}</div>
    <div class="pb-pct-row">
      <div class="pb-pct-item"><img class="pb-pct-ico" src="${IC.ontime}">${eW}%${dE}</div>
      <div class="pb-pct-item"><img class="pb-pct-ico" src="${IC.delayed}">${oW}%${dO}</div>
      <div class="pb-pct-item"><img class="pb-pct-ico" src="${IC.missed}">${lW}%${dL}</div>
      <div class="pb-pct-item"><img class="pb-pct-ico" src="${IC.excused}">${xW}%${dX}</div>
    </div>
  </div>`;
}

// ── Sunnah card ── done/skipped centred, done left of centre, skipped right of centre
function buildSunnahCard(r,st,prevSunnah,iconKey){
  const donePct=pct(st.done,st.total);const skipPct=pct(st.skipped,st.total);
  const restPct=Math.max(0,100-donePct-skipPct);
  const barInner=[
    st.done>0?`<div class="pb-seg" style="flex:${donePct};background:var(--green)"></div>`:'',
    st.skipped>0?`<div class="pb-seg" style="flex:${skipPct};background:var(--red)"></div>`:'',
    restPct>0?`<div class="pb-seg" style="flex:${restPct};background:var(--border)"></div>`:'',
  ].join('')||`<div class="pb-seg" style="flex:100;background:var(--border)"></div>`;
  const dDone=getSunnahDeltaVal(donePct,prevSunnah,r.id);
  return`<div class="pb-card">
    <div class="pb-header">
      <div class="pb-hdr-icon">${icoImg(iconKey,26)}</div>
      <span class="pb-name">${r.name}</span>
    </div>
    <div class="pb-bar-track">${barInner}</div>
    <div class="sn-pct-row">
      <div class="sn-pct-done">
        <span class="sn-pct-label" style="color:var(--green)">Done</span>
        <span class="sn-pct-num" style="color:var(--green)">${donePct}%</span>${dDone}
      </div>
      <div class="sn-pct-skip">
        <span class="sn-pct-label" style="color:var(--red)">Skipped</span>
        <span class="sn-pct-num" style="color:var(--red)">${skipPct}%</span>
      </div>
    </div>
  </div>`;
}


// ── Overall 2x2 summary (combined across all 5 fard prayers) ──
function buildOverallGrid(per,prevPer){
  const statusDefs=[
    {key:'early',  label:'On Time', css:'var(--green)', ico:'ontime'},
    {key:'ontime', label:'Delayed', css:'var(--amber)', ico:'delayed'},
    {key:'late',   label:'Missed',  css:'var(--red)',   ico:'missed'},
    {key:'excused',label:'Excused', css:'var(--purple)',ico:'excused'},
  ];
  // Sum across all 5 prayers
  let totals={early:0,ontime:0,late:0,excused:0,recorded:0};
  let prevTotals={early:0,ontime:0,late:0,excused:0,recorded:0};
  FARD.forEach(f=>{
    const ps=per[f.id];
    totals.early+=ps.early;totals.ontime+=ps.ontime;totals.late+=ps.late;totals.excused+=ps.excused;totals.recorded+=ps.recorded;
    const pp=prevPer[f.id];
    prevTotals.early+=pp.early;prevTotals.ontime+=pp.ontime;prevTotals.late+=pp.late;prevTotals.excused+=pp.excused;prevTotals.recorded+=pp.recorded;
  });
  const t=totals.recorded;const pt=prevTotals.recorded;
  let html='<div class="ov-grid">';
  statusDefs.forEach(st=>{
    const count=totals[st.key];const p=pct(count,t);
    let delta='';
    if(statsPeriod==='all'){delta=`<div class="ov-delta neutral">All-time total</div>`;}
    else if(pt===0){delta=`<div class="ov-delta neutral">— No prior data</div>`;}
    else{
      const pp2=pct(prevTotals[st.key],pt);const diff=p-pp2;
      if(diff===0){delta=`<div class="ov-delta neutral">— No change</div>`;}
      else{
        const good=st.key==='early'?diff>0:(st.key==='excused'?null:diff<0);
        const sign=diff>0?'+':'';
        const cls2=good===null?'neutral':good?'good':'bad';
        delta=`<div class="ov-delta ${cls2}">${diff>0?'\u25b2':'\u25bc'} ${sign}${diff}% vs prev</div>`;
      }
    }
    html+=`<div class="ov-card">
      <div class="ov-top"><img class="ov-ico" src="${IC[st.ico]}"><span>${st.label}</span></div>
      <div class="ov-pct" style="color:${st.css}">${p}%</div>
      <div class="ov-count">${count} of ${t} prayers</div>
      ${delta}
    </div>`;
  });
  html+='</div>';
  return html;
}

// ── Overall 2x2 summary for rawatib/nafl sunnah ──
function buildSunnahOverallGrid(items,stats,prevStats){
  const totalDone=items.reduce((s,r)=>s+stats[r.id].done,0);
  const totalSkipped=items.reduce((s,r)=>s+stats[r.id].skipped,0);
  const totalExcused=items.reduce((s,r)=>s+(stats[r.id].excused||0),0);
  const totalRecorded=totalDone+totalSkipped+totalExcused;
  const prevDone=items.reduce((s,r)=>s+prevStats[r.id].done,0);
  const prevSkipped=items.reduce((s,r)=>s+prevStats[r.id].skipped,0);
  const prevExcused=items.reduce((s,r)=>s+(prevStats[r.id].excused||0),0);
  const prevRecorded=prevDone+prevSkipped+prevExcused;
  if(totalRecorded===0)return'';
  const donePct=pct(totalDone,totalRecorded);
  const skipPct=pct(totalSkipped,totalRecorded);
  const excusedPct=pct(totalExcused,totalRecorded);
  const defs=[
    {label:'Done',   pct:donePct,    count:totalDone,    css:'var(--green)', prevCount:prevDone,    prevTotal:prevRecorded},
    {label:'Skipped',pct:skipPct,    count:totalSkipped,  css:'var(--red)',   prevCount:prevSkipped,  prevTotal:prevRecorded},
    {label:'Excused',pct:excusedPct, count:totalExcused,  css:'var(--purple)',prevCount:prevExcused,  prevTotal:prevRecorded},
  ];
  let html='<div class="ov-grid" style="grid-template-columns:1fr 1fr 1fr;">';
  defs.forEach(d=>{
    let delta='';
    if(statsPeriod==='all'){delta=`<div class="ov-delta neutral">All-time total</div>`;}
    else if(d.prevTotal===0){delta=`<div class="ov-delta neutral">— No prior data</div>`;}
    else{
      const pp=pct(d.prevCount,d.prevTotal);const diff=d.pct-pp;
      if(diff===0){delta=`<div class="ov-delta neutral">— No change</div>`;}
      else{
        const good=d.label==='Done'?diff>0:(d.label==='Excused'?null:diff<0);
        const sign=diff>0?'+':'';
        const cls=good===null?'neutral':good?'good':'bad';
        delta=`<div class="ov-delta ${cls}">${diff>0?'▲':'▼'} ${sign}${diff}% vs prev</div>`;
      }
    }
    html+=`<div class="ov-card">
      <div class="ov-top"><span style="font-size:13px;font-weight:700;color:${d.css}">${d.label}</span></div>
      <div class="ov-pct" style="color:${d.css}">${d.pct}%</div>
      <div class="ov-count">${d.count} of ${totalRecorded}</div>
      ${delta}
    </div>`;
  });
  html+='</div>';
  return html;
}

// ── Main render ──
function renderStats(animDir){
  document.getElementById('statsPeriodLabel').textContent=periodLabel();
  document.getElementById('statsPrevBtn').disabled=statsOffset<=minOffset();
  document.getElementById('statsNextBtn').disabled=(statsPeriod==='all')||(statsOffset>=0);

  const dates=getDates(statsPeriod,statsOffset);
  const per=calcPerSalah(dates);
  const naflItems=ramadan?[...NAFL_BASE,TARAWEEH]:NAFL_BASE;
  const rStats=calcSunnah(dates,RAWATIB);
  const nStats=calcSunnah(dates,naflItems);
  const anyFard=FARD.some(f=>per[f.id].recorded>0);

  const inner=document.getElementById('statsSwipeInner');
  if(animDir!==undefined&&statsPeriod!=='all'){
    inner.style.transition='none';
    inner.style.transform=`translateX(${animDir>0?'100%':'-100%'})`;
    requestAnimationFrame(()=>{inner.style.transition='transform 0.25s cubic-bezier(0.4,0,0.2,1)';inner.style.transform='translateX(0)';});
  } else {inner.style.transition='none';inner.style.transform='translateX(0)';}

  inner.innerHTML='';const panel=document.createElement('div');panel.className='stats-panel';

  // Previous period for comparison
  const prevDates=statsPeriod!=='all'?getDates(statsPeriod,statsOffset-1):[];
  const prevPer=calcPerSalah(prevDates);
  const prevRStats=calcSunnah(prevDates,RAWATIB);
  const prevNStats=calcSunnah(prevDates,naflItems);

  const hasAny=anyFard||RAWATIB.some(r=>rStats[r.id].total>0)||naflItems.some(r=>nStats[r.id].total>0);
  if(!hasAny){
    panel.innerHTML=`<div class="pi"><div class="stats-empty"><span class="stats-empty-icon">\u{1f552}</span>No prayers recorded for this period yet.</div></div>`;
    inner.appendChild(panel);return;
  }

  let html='<div class="pi">';

  if(statsSubTab==='fard'){
    // ── FARD page ──
    // Overall 2x2 summary grid
    if(anyFard){
      html+=`<div class="stats-sec">Overall Summary</div>`;
      html+=buildOverallGrid(per,prevPer);
    }
    html+=`<div class="stats-sec" style="margin-top:14px">Prayer Grid</div>`;
    html+=buildPrayerGrid(dates,FARD,fardAccessor,fardIconKey);
    if(isPeriodComplete()&&anyFard&&statsPeriod!=='all'){
      html+=`<div class="stats-sec" style="margin-top:14px">Area to Improve</div>`;
      html+=buildFocusBanner(per);
    }
    html+=`<div class="stats-sec" style="margin-top:14px">Fard Prayer Breakdown</div>`;
    FARD.forEach(f=>{html+=buildFardCard(f,per[f.id],prevPer);});
  } else {
    // ── SUNNAH page ──
    const rawSummary=buildSunnahOverallGrid(RAWATIB,rStats,prevRStats);
    if(rawSummary){
      html+=`<div class="stats-sec">Rawatib Summary</div>`;
      html+=rawSummary;
    }
    html+=`<div class="stats-sec" style="margin-top:14px">Rawatib Grid</div>`;
    html+=buildPrayerGrid(dates,RAWATIB,sunnahAccessor,rawatibIconKey);
    html+=`<div class="stats-sec" style="margin-top:14px">Rawatib Sunnah</div>`;
    RAWATIB.forEach(r=>{html+=buildSunnahCard(r,rStats[r.id],prevRStats,rawatibIconKey(r.id));});
    const naflSummary=buildSunnahOverallGrid(naflItems,nStats,prevNStats);
    if(naflSummary){
      html+=`<div class="stats-sec" style="margin-top:14px">Nafl Summary</div>`;
      html+=naflSummary;
    }
    html+=`<div class="stats-sec" style="margin-top:14px">Nafl Grid</div>`;
    html+=buildPrayerGrid(dates,naflItems,sunnahAccessor,naflIconKey);
    html+=`<div class="stats-sec" style="margin-top:14px">Nafl Prayers</div>`;
    naflItems.forEach(r=>{html+=buildSunnahCard(r,nStats[r.id],prevNStats,naflIconKey(r.id));});
  }

  html+='</div>';
  panel.innerHTML=html;inner.appendChild(panel);
}
